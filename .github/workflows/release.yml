name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag '$TAG' must match manifest.json version '$VERSION'."
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build and release check
        run: npm run release:check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(manifest.json main.js versions.json)
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi

          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --title "$GITHUB_REF_NAME" \
            --notes "BRAT/install assets for Context Graph Memory $GITHUB_REF_NAME."
